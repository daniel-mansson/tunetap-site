<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <title>Create · TuneTap</title>
  <meta name="description" content="Local card creation tool.">
  <meta name="theme-color" content="#eef0f4">
  <meta name="color-scheme" content="light">
  <meta name="robots" content="noindex">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <style>
    :root {
      --ink: #1a1722; --muted: #7a7385;
      --glass: rgba(255,255,255,0.66);
      --line: rgba(26,23,34,0.10);
      --line-soft: rgba(26,23,34,0.06);
      --panel: #ffffff;
      --accent: #1db954;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; }
    body {
      min-height: 100dvh; color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
      background:
        radial-gradient(130% 120% at 50% -10%, #ffffff 0%, #eef0f4 42%, #dcdfe6 78%, #cdd1da 100%);
      background-attachment: fixed;
      display: flex; flex-direction: column; align-items: center;
      padding: max(16px, env(safe-area-inset-top)) 16px max(20px, env(safe-area-inset-bottom));
      gap: 14px;
    }

    /* ---- 3D preview stage ---- */
    .stage {
      width: 100%; max-width: 480px;
      height: min(50vh, 380px);
    }
    #gl { width: 100%; height: 100%; display: block; touch-action: none; cursor: grab; }
    #gl:active { cursor: grabbing; }

    /* ---- Controls ---- */
    .panel {
      width: 100%; max-width: 480px;
      background: var(--panel); border: 1px solid var(--line);
      border-radius: 20px; padding: 16px;
      box-shadow: 0 1px 0 rgba(255,255,255,0.7) inset, 0 14px 30px -20px rgba(26,23,34,0.4);
      display: flex; flex-direction: column; gap: 18px;
    }
    .group { display: flex; flex-direction: column; gap: 10px; }
    .lbl {
      font-size: 11px; font-weight: 700; letter-spacing: 0.06em;
      text-transform: uppercase; color: var(--muted);
    }
    .row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .mini { font-size: 13px; color: var(--muted); min-width: 38px; }
    .status { min-width: auto; }
    .status.err { color: #b23b3b; }
    .status.ok { color: var(--muted); }

    .btn {
      appearance: none; border: 1px solid var(--line); background: #fff;
      color: var(--ink); font: inherit; font-weight: 600; font-size: 14px;
      padding: 10px 16px; border-radius: 12px; cursor: pointer; flex: 1;
      transition: transform .1s ease, background .2s ease;
    }
    .btn:active { transform: translateY(1px); }
    .btn.primary { background: var(--ink); color: #fff; border-color: transparent; }

    input[type=range] { flex: 1; accent-color: var(--accent); height: 26px; }

    .swatches { gap: 10px; }
    .swatch {
      width: 34px; height: 34px; border-radius: 10px; cursor: pointer;
      border: 2px solid transparent; box-shadow: 0 0 0 1px var(--line) inset;
      padding: 0; appearance: none;
    }
    .swatch.active { border-color: var(--ink); }

    .chip {
      appearance: none; border: 1px solid var(--line); background: #fff;
      color: var(--ink); font: inherit; font-weight: 600; font-size: 13px;
      padding: 9px 12px; border-radius: 11px; cursor: pointer;
      display: inline-flex; align-items: center; gap: 7px;
    }
    .chip.active { border-color: var(--ink); background: #f3f2f5; }
    .chip input[type=color] {
      width: 20px; height: 20px; border: none; padding: 0; background: none;
      border-radius: 5px; cursor: pointer;
    }
    .chip .sw {
      width: 16px; height: 16px; border-radius: 5px; box-shadow: 0 0 0 1px var(--line) inset;
    }

    .text {
      width: 100%; font: inherit; font-size: 15px; color: var(--ink);
      padding: 11px 13px; border: 1px solid var(--line); border-radius: 12px;
      background: #fff;
    }
    .text:focus { outline: none; border-color: var(--ink); }

    .foot {
      display: flex; justify-content: space-between; align-items: center;
      font-size: 11px; color: var(--muted); padding-top: 2px;
    }
  </style>
</head>
<body>
  <div class="stage"><canvas id="gl"></canvas></div>

  <div class="panel">
    <div class="group">
      <span class="lbl">Photo</span>
      <div class="row">
        <button class="btn primary" id="pick">Choose photo</button>
        <button class="btn" id="flip">Flip to back</button>
        <input type="file" id="file" accept="image/*" hidden>
      </div>
      <div class="row"><span class="mini status" id="status"></span></div>
      <div class="row">
        <span class="mini">Zoom</span>
        <input type="range" id="zoom" min="1" max="4" step="0.01" value="1">
      </div>
    </div>

    <div class="group">
      <span class="lbl">Filter</span>
      <div class="row" id="filters"></div>
      <div class="row">
        <span class="mini">Vignette</span>
        <input type="range" id="vignette" min="0" max="1" step="0.02" value="0">
      </div>
    </div>

    <div class="group">
      <span class="lbl">Header bar</span>
      <input type="text" id="headerText" class="text" value="Morning Focus" maxlength="28" placeholder="Header label">
      <div class="row">
        <span class="mini">Height</span>
        <input type="range" id="headerHeight" min="0.05" max="0.22" step="0.005" value="0.11">
      </div>
      <div class="row">
        <span class="mini">Font</span>
        <input type="range" id="headerFont" min="0.26" max="0.64" step="0.01" value="0.42">
      </div>
      <div class="row swatches" id="swatches"></div>
      <div class="row">
        <label class="chip" id="customChip">
          <span class="sw" id="customSw"></span>
          <span>Custom</span>
          <input type="color" id="custom" value="#3a4036" hidden>
        </label>
        <button class="chip" id="darken">Darken</button>
        <button class="chip" id="transparent">Transparent</button>
      </div>
    </div>

    <div class="group">
      <span class="lbl">Title</span>
      <input type="text" id="title" class="text" value="Focus" maxlength="24" placeholder="Big title (bottom-left)">
      <div class="row">
        <span class="mini">Size</span>
        <input type="range" id="titleFont" min="0.08" max="0.30" step="0.005" value="0.17">
      </div>
      <div class="row swatches" id="titleSwatches"></div>
      <div class="row">
        <label class="chip" id="titleCustomChip">
          <span class="sw" id="titleCustomSw"></span>
          <span>Custom</span>
          <input type="color" id="titleCustom" value="#ffffff" hidden>
        </label>
      </div>
    </div>

    <div class="group">
      <button class="btn" id="save">Save PNG</button>
    </div>

    <div class="foot">
      <span>Local preview — nothing is uploaded.</span>
      <span id="ver">create v7</span>
    </div>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.169.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.169.0/examples/jsm/"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';

    // ---- Card geometry (world) + texture (canvas) dimensions ----
    const CARD_W = 3.4, CARD_H = CARD_W / 1.586, CARD_D = 0.055, RADIUS = 0.14;
    const CW = 1400, CH = Math.round(1400 / 1.586);
    const TEX_R = CW * (RADIUS / CARD_W);   // texture corner radius matches mesh silhouette

    const clamp = (v, a, b) => Math.min(b, Math.max(a, v));
    const lerp = (a, b, t) => a + (b - a) * t;

    // ---- Editable state ----
    let img = null;
    let zoom = 1, panX = 0, panY = 0;
    // Header bar (top): its own label text, height, font, and background treatment.
    let headerMode = 'color';          // 'color' | 'darken' | 'transparent'
    let headerColor = '#3a4036';
    let headerText = 'Morning Focus';
    let headerHeight = 0.11;            // fraction of card height
    let headerFont = 0.42;             // fraction of header height
    // Main title (large, bottom-left): distinct text, size, and color.
    let title = 'Focus';
    let titleFont = 0.17;             // fraction of card height
    let titleColor = '#ffffff';
    // Photo styling.
    let filterCss = 'none';
    let vignette = 0;                 // 0..1

    // ---- Offscreen canvases used as card-face textures ----
    const frontCanvas = document.createElement('canvas');
    frontCanvas.width = CW; frontCanvas.height = CH;
    const fctx = frontCanvas.getContext('2d');
    const backCanvas = document.createElement('canvas');
    backCanvas.width = CW; backCanvas.height = CH;
    const bctx = backCanvas.getContext('2d');

    function roundRectPath(c, x, y, w, h, r) {
      c.beginPath();
      c.moveTo(x + r, y);
      c.arcTo(x + w, y, x + w, y + h, r);
      c.arcTo(x + w, y + h, x, y + h, r);
      c.arcTo(x, y + h, x, y, r);
      c.arcTo(x, y, x + w, y, r);
      c.closePath();
    }
    function contrastInk(hex) {
      const n = hex.replace('#', '');
      const r = parseInt(n.substr(0, 2), 16), g = parseInt(n.substr(2, 2), 16), b = parseInt(n.substr(4, 2), 16);
      return (0.299 * r + 0.587 * g + 0.114 * b) / 255 > 0.62 ? '#20221c' : '#f2f1ea';
    }

    function drawPlaceholder() {
      const g = fctx.createLinearGradient(0, 0, CW, CH);
      g.addColorStop(0, '#e7e9ee'); g.addColorStop(1, '#d3d7df');
      fctx.fillStyle = g; fctx.fillRect(0, 0, CW, CH);
      fctx.fillStyle = 'rgba(26,23,34,0.32)';
      fctx.textAlign = 'center'; fctx.textBaseline = 'middle';
      fctx.font = `500 ${Math.round(CH * 0.06)}px -apple-system, "Segoe UI", sans-serif`;
      fctx.fillText('Choose a photo to begin', CW / 2, CH * 0.56);
      fctx.font = `${Math.round(CH * 0.13)}px -apple-system, sans-serif`;
      fctx.fillText('▦', CW / 2, CH * 0.42);
    }

    function drawPhoto() {
      const base = Math.max(CW / img.width, CH / img.height);
      const s = base * zoom;
      const w = img.width * s, h = img.height * s;
      const maxX = Math.max(0, (w - CW) / 2), maxY = Math.max(0, (h - CH) / 2);
      panX = clamp(panX, -maxX, maxX);
      panY = clamp(panY, -maxY, maxY);
      fctx.filter = filterCss;
      fctx.drawImage(img, (CW - w) / 2 + panX, (CH - h) / 2 + panY, w, h);
      fctx.filter = 'none';
    }

    // Radial vignette darkening the edges/corners.
    function drawVignette() {
      if (vignette <= 0) return;
      const g = fctx.createRadialGradient(CW / 2, CH * 0.5, CH * 0.30, CW / 2, CH * 0.5, CH * 0.95);
      g.addColorStop(0, 'rgba(0,0,0,0)');
      g.addColorStop(0.6, `rgba(0,0,0,${vignette * 0.22})`);
      g.addColorStop(1, `rgba(0,0,0,${vignette * 0.62})`);
      fctx.fillStyle = g; fctx.fillRect(0, 0, CW, CH);
    }

    function drawHeader() {
      const hh = CH * headerHeight;
      let ink = '#f2f1ea', shadow = false;
      if (headerMode === 'color') {
        fctx.fillStyle = headerColor; fctx.fillRect(0, 0, CW, hh);
        ink = contrastInk(headerColor);
      } else if (headerMode === 'darken') {
        fctx.fillStyle = 'rgba(0,0,0,0.58)'; fctx.fillRect(0, 0, CW, hh);
        shadow = true;
      } else {
        shadow = true;
      }
      if (headerMode !== 'transparent') {
        fctx.fillStyle = 'rgba(0,0,0,0.12)'; fctx.fillRect(0, hh - 2, CW, 2);
      }
      if (!headerText) return;
      fctx.textAlign = 'left'; fctx.textBaseline = 'middle';
      fctx.font = `500 ${Math.round(hh * headerFont)}px -apple-system, "Segoe UI", Roboto, sans-serif`;
      if (shadow) { fctx.shadowColor = 'rgba(0,0,0,0.55)'; fctx.shadowBlur = 10; fctx.shadowOffsetY = 1; }
      fctx.fillStyle = ink;
      fctx.fillText(headerText, CW * 0.045, hh * 0.56);
      fctx.shadowColor = 'transparent'; fctx.shadowBlur = 0; fctx.shadowOffsetY = 0;
    }

    // Main title: large, anchored bottom-left, with a soft shadow for legibility.
    function drawMainTitle() {
      if (!title) return;
      const size = CH * titleFont;
      fctx.textAlign = 'left'; fctx.textBaseline = 'alphabetic';
      fctx.font = `700 ${Math.round(size)}px -apple-system, "Segoe UI", Roboto, sans-serif`;
      fctx.shadowColor = 'rgba(0,0,0,0.45)'; fctx.shadowBlur = size * 0.22; fctx.shadowOffsetY = size * 0.03;
      fctx.fillStyle = titleColor;
      fctx.fillText(title, CW * 0.05, CH * 0.93);
      fctx.shadowColor = 'transparent'; fctx.shadowBlur = 0; fctx.shadowOffsetY = 0;
    }

    function compose() {
      fctx.clearRect(0, 0, CW, CH);
      fctx.save();
      roundRectPath(fctx, 0, 0, CW, CH, TEX_R);
      fctx.clip();
      if (img) drawPhoto(); else drawPlaceholder();
      drawVignette();
      drawHeader();
      drawMainTitle();
      fctx.restore();
      if (frontTex) frontTex.needsUpdate = true;
    }

    function drawBack() {
      bctx.clearRect(0, 0, CW, CH);
      bctx.save();
      roundRectPath(bctx, 0, 0, CW, CH, TEX_R);
      bctx.clip();
      const g = bctx.createLinearGradient(0, 0, 0, CH);
      g.addColorStop(0, '#d0d5c5'); g.addColorStop(1, '#a9b499');
      bctx.fillStyle = g; bctx.fillRect(0, 0, CW, CH);
      const cx = CW * 0.5, cy = CH * 0.5;
      bctx.strokeStyle = 'rgba(51,80,43,0.7)'; bctx.lineWidth = 6; bctx.lineCap = 'round';
      for (let i = 1; i <= 3; i++) {
        bctx.beginPath(); bctx.arc(cx - i * 5, cy, i * CW * 0.05, -Math.PI * 0.4, Math.PI * 0.4); bctx.stroke();
      }
      bctx.fillStyle = 'rgba(51,80,43,0.7)';
      bctx.beginPath(); bctx.arc(cx - CW * 0.02, cy, 8, 0, Math.PI * 2); bctx.fill();
      bctx.textAlign = 'center'; bctx.textBaseline = 'alphabetic';
      bctx.fillStyle = 'rgba(38,54,34,0.85)';
      bctx.font = `600 ${Math.round(CH * 0.075)}px -apple-system, sans-serif`;
      bctx.fillText('Tap to play', cx, CH * 0.80);
      bctx.fillStyle = 'rgba(38,54,34,0.5)';
      bctx.font = `400 ${Math.round(CH * 0.05)}px -apple-system, sans-serif`;
      bctx.fillText('tunetap.to', cx, CH * 0.90);
      // header bar
      const hh = CH * 0.11;   // back header is fixed (front height slider only affects the front)
      bctx.fillStyle = 'rgba(58,64,54,0.97)'; bctx.fillRect(0, 0, CW, hh);
      bctx.textAlign = 'left'; bctx.textBaseline = 'middle';
      bctx.fillStyle = '#f2f1ea';
      bctx.font = `500 ${Math.round(hh * 0.42)}px -apple-system, sans-serif`;
      bctx.fillText('TuneTap', CW * 0.045, hh * 0.56);
      bctx.restore();
      if (backTex) backTex.needsUpdate = true;
    }

    // ---- Three.js scene ----
    const glCanvas = document.getElementById('gl');
    const stage = document.querySelector('.stage');
    const renderer = new THREE.WebGLRenderer({ canvas: glCanvas, antialias: true, alpha: true });
    renderer.setClearColor(0x000000, 0);
    renderer.toneMapping = THREE.NoToneMapping;   // neutral, accurate face colors
    renderer.outputColorSpace = THREE.SRGBColorSpace;

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(42, 1, 0.1, 100);

    const pmrem = new THREE.PMREMGenerator(renderer);
    scene.environment = pmrem.fromScene(new RoomEnvironment(), 0.04).texture;

    const key = new THREE.DirectionalLight(0xffffff, 1.0); key.position.set(2.2, 4.5, 3.5); scene.add(key);
    const fill = new THREE.DirectionalLight(0xdfe6ff, 0.35); fill.position.set(-3, 1.5, 2); scene.add(fill);
    const rim = new THREE.DirectionalLight(0xbfd4ff, 0.6); rim.position.set(-2.5, 3.5, -4); scene.add(rim);
    const warm = new THREE.DirectionalLight(0xffdcae, 0.5); warm.position.set(4.5, 0.8, 2); scene.add(warm);
    const under = new THREE.DirectionalLight(0xeaf0ff, 0.22); under.position.set(0, -3, 3); scene.add(under);

    const maxAniso = renderer.capabilities.getMaxAnisotropy();
    const frontTex = new THREE.CanvasTexture(frontCanvas);
    frontTex.colorSpace = THREE.SRGBColorSpace; frontTex.anisotropy = maxAniso;
    const backTex = new THREE.CanvasTexture(backCanvas);
    backTex.colorSpace = THREE.SRGBColorSpace; backTex.anisotropy = maxAniso;

    const card = new THREE.Group();
    scene.add(card);

    function roundedRectShape(w, h, r) {
      const s = new THREE.Shape();
      const x = -w / 2, y = -h / 2;
      s.moveTo(x + r, y);
      s.lineTo(x + w - r, y); s.quadraticCurveTo(x + w, y, x + w, y + r);
      s.lineTo(x + w, y + h - r); s.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      s.lineTo(x + r, y + h); s.quadraticCurveTo(x, y + h, x, y + h - r);
      s.lineTo(x, y + r); s.quadraticCurveTo(x, y, x + r, y);
      return s;
    }
    const bodyGeo = new THREE.ExtrudeGeometry(
      roundedRectShape(CARD_W, CARD_H, RADIUS),
      { depth: CARD_D, bevelEnabled: false, curveSegments: 32 }
    );
    bodyGeo.translate(0, 0, -CARD_D / 2);
    card.add(new THREE.Mesh(bodyGeo, new THREE.MeshPhysicalMaterial({
      color: 0xe8e5db, roughness: 0.4, metalness: 0.0, clearcoat: 0.7, clearcoatRoughness: 0.25,
    })));

    function facePlane(tex, front) {
      // Unlit so the photo/header colors render exactly as composed — no specular
      // glare or environment veil washing them out when viewed head-on.
      const mat = new THREE.MeshBasicMaterial({ map: tex, transparent: true, alphaTest: 0.5 });
      const m = new THREE.Mesh(new THREE.PlaneGeometry(CARD_W, CARD_H), mat);
      m.position.z = front ? (CARD_D / 2 + 0.004) : -(CARD_D / 2 + 0.004);
      if (!front) m.rotation.y = Math.PI;
      return m;
    }
    card.add(facePlane(frontTex, true));
    card.add(facePlane(backTex, false));

    // soft contact shadow
    const shadowTex = (() => {
      const c = document.createElement('canvas'); c.width = c.height = 256;
      const g = c.getContext('2d').createRadialGradient(128, 128, 8, 128, 128, 128);
      g.addColorStop(0, 'rgba(20,25,35,0.5)'); g.addColorStop(0.5, 'rgba(20,25,35,0.2)'); g.addColorStop(1, 'rgba(20,25,35,0)');
      const cx = c.getContext('2d'); cx.fillStyle = g; cx.fillRect(0, 0, 256, 256);
      const t = new THREE.CanvasTexture(c); t.colorSpace = THREE.SRGBColorSpace; return t;
    })();
    const shadow = new THREE.Mesh(
      new THREE.PlaneGeometry(CARD_W * 1.2, CARD_W * 1.2),
      new THREE.MeshBasicMaterial({ map: shadowTex, transparent: true, opacity: 0.33, depthWrite: false })
    );
    shadow.rotation.x = -Math.PI / 2; shadow.position.y = -CARD_H * 0.5 - 0.18;
    scene.add(shadow);

    function fit() {
      const w = stage.clientWidth, h = stage.clientHeight;
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.setSize(w, h, false);
      camera.aspect = w / h;
      const vFov = THREE.MathUtils.degToRad(camera.fov);
      const fitH = (CARD_H * 0.5) / Math.tan(vFov / 2);
      const fitW = (CARD_W * 0.5) / (Math.tan(vFov / 2) * (w / h));
      camera.position.set(0, 0.1, Math.max(fitH, fitW) * 1.32);
      camera.lookAt(0, 0, 0);
      camera.updateProjectionMatrix();
    }
    window.addEventListener('resize', fit);
    if (window.visualViewport) window.visualViewport.addEventListener('resize', fit);
    fit();

    // ---- Flip animation ----
    let targetFlip = 0, curFlip = 0;
    const flipBtn = document.getElementById('flip');
    flipBtn.addEventListener('click', () => {
      targetFlip = targetFlip === 0 ? Math.PI : 0;
      flipBtn.textContent = targetFlip === 0 ? 'Flip to back' : 'Show front';
    });

    function tick() {
      const t = performance.now() * 0.001;
      curFlip += (targetFlip - curFlip) * 0.12;
      card.rotation.y = curFlip + Math.sin(t * 0.5) * 0.06;   // gentle idle sway
      card.rotation.x = Math.sin(t * 0.72) * 0.045;
      card.position.y = Math.sin(t * 0.9) * 0.015;
      renderer.render(scene, camera);
      requestAnimationFrame(tick);
    }

    // ---- Crop panning mapped through the card's on-screen size ----
    const _a = new THREE.Vector3(), _b = new THREE.Vector3();
    function texPerScreenPx() {
      _a.set(-CARD_W / 2, 0, CARD_D / 2).project(camera);
      _b.set(CARD_W / 2, 0, CARD_D / 2).project(camera);
      const cardPx = Math.abs((_b.x - _a.x) * 0.5 * glCanvas.clientWidth);
      return cardPx > 1 ? CW / cardPx : 1;
    }

    const pts = new Map();
    let lastDist = 0, lastMid = null;
    const zoomSlider = document.getElementById('zoom');

    glCanvas.addEventListener('pointerdown', (e) => {
      glCanvas.setPointerCapture(e.pointerId);
      pts.set(e.pointerId, { x: e.clientX, y: e.clientY });
    });
    glCanvas.addEventListener('pointermove', (e) => {
      if (!pts.has(e.pointerId)) return;
      const prev = pts.get(e.pointerId);
      const f = texPerScreenPx();
      if (pts.size === 1 && img) {
        panX += (e.clientX - prev.x) * f;
        panY += (e.clientY - prev.y) * f;
        compose();
      }
      pts.set(e.pointerId, { x: e.clientX, y: e.clientY });
      if (pts.size === 2) {
        const a = [...pts.values()];
        const dist = Math.hypot(a[0].x - a[1].x, a[0].y - a[1].y);
        const mid = { x: (a[0].x + a[1].x) / 2, y: (a[0].y + a[1].y) / 2 };
        if (lastDist && img) {
          zoom = clamp(zoom * (dist / lastDist), 1, 4);
          panX += (mid.x - lastMid.x) * f; panY += (mid.y - lastMid.y) * f;
          zoomSlider.value = zoom; compose();
        }
        lastDist = dist; lastMid = mid;
      }
    });
    function endPointer(e) { pts.delete(e.pointerId); if (pts.size < 2) { lastDist = 0; lastMid = null; } }
    glCanvas.addEventListener('pointerup', endPointer);
    glCanvas.addEventListener('pointercancel', endPointer);
    glCanvas.addEventListener('wheel', (e) => {
      if (!img) return;
      e.preventDefault();
      zoom = clamp(zoom * (e.deltaY < 0 ? 1.08 : 0.925), 1, 4);
      zoomSlider.value = zoom; compose();
    }, { passive: false });

    zoomSlider.addEventListener('input', () => { zoom = parseFloat(zoomSlider.value); compose(); });

    // ---- Photo loading (robust decode + downscale + HEIC) ----
    const MAX_SRC = 2600;
    const fileInput = document.getElementById('file');
    const statusEl = document.getElementById('status');
    document.getElementById('pick').addEventListener('click', () => fileInput.click());

    function setStatus(msg, kind) {
      statusEl.textContent = msg || '';
      statusEl.className = 'mini status' + (kind ? ' ' + kind : '');
    }
    function downscale(src) {
      const w = src.width, h = src.height;
      const sc = Math.min(1, MAX_SRC / Math.max(w, h));
      if (sc >= 1 && src instanceof HTMLCanvasElement) return src;
      const oc = document.createElement('canvas');
      oc.width = Math.max(1, Math.round(w * sc));
      oc.height = Math.max(1, Math.round(h * sc));
      oc.getContext('2d').drawImage(src, 0, 0, oc.width, oc.height);
      return oc;
    }
    function loadViaImg(blob) {
      return new Promise((resolve, reject) => {
        const url = URL.createObjectURL(blob);
        const im = new Image();
        im.onload = () => { const c = downscale(im); URL.revokeObjectURL(url); resolve(c); };
        im.onerror = () => { URL.revokeObjectURL(url); reject(new Error('decode failed')); };
        im.src = url;
      });
    }
    async function tryNative(blob) {
      if (window.createImageBitmap) {
        const bmp = await createImageBitmap(blob, { imageOrientation: 'from-image' }).catch(() => null);
        if (bmp) return bmp;
      }
      return await loadViaImg(blob).catch(() => null);
    }
    function looksHeic(file) {
      const t = (file.type || '').toLowerCase(), n = (file.name || '').toLowerCase();
      return t.includes('heic') || t.includes('heif') || /\.(heic|heif)$/.test(n);
    }
    let heicLibPromise = null;
    function loadHeicLib() {
      if (heicLibPromise) return heicLibPromise;
      heicLibPromise = new Promise((res, rej) => {
        const s = document.createElement('script');
        s.src = 'https://cdn.jsdelivr.net/npm/heic2any@0.0.4/dist/heic2any.min.js';
        s.onload = res; s.onerror = () => { heicLibPromise = null; rej(new Error('heic lib failed')); };
        document.head.appendChild(s);
      });
      return heicLibPromise;
    }
    async function heicToJpeg(file) {
      await loadHeicLib();
      const out = await window.heic2any({ blob: file, toType: 'image/jpeg', quality: 0.92 });
      return Array.isArray(out) ? out[0] : out;
    }
    async function decodeToSource(file) {
      let src = await tryNative(file);
      if (src) return src;
      if (looksHeic(file)) {
        setStatus('Converting HEIC…', 'ok');
        const jpeg = await heicToJpeg(file);
        src = await tryNative(jpeg);
        if (src) return src;
      }
      throw new Error('unsupported');
    }
    async function loadFile(file) {
      setStatus('Loading…', 'ok');
      try {
        const source = await decodeToSource(file);
        img = downscale(source);
        if (source.close) source.close();
        zoom = 1; panX = 0; panY = 0; zoomSlider.value = 1;
        setStatus('', ''); compose();
      } catch (err) {
        img = null; compose();
        setStatus("Couldn't load this photo — try a JPG or PNG export.", 'err');
      }
    }
    fileInput.addEventListener('change', (e) => {
      const f = e.target.files && e.target.files[0];
      if (f) loadFile(f);
    });

    // ---- Header controls ----
    const PRESETS = ['#3a4036', '#2b3a2f', '#22303c', '#3a2f4a', '#5c4433', '#7a3b3b', '#cbd0bd', '#f2f1ea'];
    const swatchWrap = document.getElementById('swatches');
    const customChip = document.getElementById('customChip');
    const customInput = document.getElementById('custom');
    const customSw = document.getElementById('customSw');
    const darkenBtn = document.getElementById('darken');
    const transBtn = document.getElementById('transparent');
    const selectable = [];
    function setActive(el) { selectable.forEach(s => s.classList.toggle('active', s === el)); }

    PRESETS.forEach((col, i) => {
      const b = document.createElement('button');
      b.className = 'swatch'; b.style.background = col; b.type = 'button';
      b.addEventListener('click', () => { headerMode = 'color'; headerColor = col; setActive(b); compose(); });
      swatchWrap.appendChild(b); selectable.push(b);
      if (i === 0) setActive(b);
    });
    customSw.style.background = customInput.value;
    customChip.addEventListener('click', () => customInput.click());
    customInput.addEventListener('input', () => {
      headerMode = 'color'; headerColor = customInput.value;
      customSw.style.background = customInput.value; setActive(customChip); compose();
    });
    selectable.push(customChip);
    darkenBtn.addEventListener('click', () => { headerMode = 'darken'; setActive(darkenBtn); compose(); });
    transBtn.addEventListener('click', () => { headerMode = 'transparent'; setActive(transBtn); compose(); });
    selectable.push(darkenBtn, transBtn);

    // ---- Filter presets + vignette ----
    const FILTERS = [
      { name: 'None', css: 'none' },
      { name: 'B&W', css: 'grayscale(1) contrast(1.06)' },
      { name: 'Sepia', css: 'sepia(0.6) contrast(1.05) brightness(1.02)' },
      { name: 'Warm', css: 'saturate(1.15) sepia(0.18) brightness(1.03)' },
      { name: 'Cool', css: 'saturate(1.06) hue-rotate(-12deg) brightness(1.02)' },
      { name: 'Vivid', css: 'saturate(1.4) contrast(1.1)' },
      { name: 'Fade', css: 'contrast(0.9) brightness(1.08) saturate(0.82)' },
    ];
    const filterWrap = document.getElementById('filters');
    const filterBtns = [];
    FILTERS.forEach((f, i) => {
      const b = document.createElement('button');
      b.className = 'chip'; b.type = 'button'; b.textContent = f.name;
      b.addEventListener('click', () => {
        filterCss = f.css;
        filterBtns.forEach(x => x.classList.toggle('active', x === b));
        compose();
      });
      filterWrap.appendChild(b); filterBtns.push(b);
      if (i === 0) b.classList.add('active');
    });
    document.getElementById('vignette').addEventListener('input', (e) => { vignette = parseFloat(e.target.value); compose(); });

    document.getElementById('headerText').addEventListener('input', (e) => { headerText = e.target.value; compose(); });
    document.getElementById('headerHeight').addEventListener('input', (e) => { headerHeight = parseFloat(e.target.value); compose(); });
    document.getElementById('headerFont').addEventListener('input', (e) => { headerFont = parseFloat(e.target.value); compose(); });

    // ---- Title controls (distinct from the header) ----
    const TITLE_PRESETS = ['#ffffff', '#f2e9d0', '#12140f', '#1db954', '#e5b84a', '#c95b3b'];
    const titleSwatchWrap = document.getElementById('titleSwatches');
    const titleCustomChip = document.getElementById('titleCustomChip');
    const titleCustomInput = document.getElementById('titleCustom');
    const titleCustomSw = document.getElementById('titleCustomSw');
    const titleSelectable = [];
    function setTitleActive(el) { titleSelectable.forEach(s => s.classList.toggle('active', s === el)); }

    TITLE_PRESETS.forEach((col, i) => {
      const b = document.createElement('button');
      b.className = 'swatch'; b.style.background = col; b.type = 'button';
      b.addEventListener('click', () => { titleColor = col; setTitleActive(b); compose(); });
      titleSwatchWrap.appendChild(b); titleSelectable.push(b);
      if (i === 0) setTitleActive(b);
    });
    titleCustomSw.style.background = titleCustomInput.value;
    titleCustomChip.addEventListener('click', () => titleCustomInput.click());
    titleCustomInput.addEventListener('input', () => {
      titleColor = titleCustomInput.value;
      titleCustomSw.style.background = titleCustomInput.value; setTitleActive(titleCustomChip); compose();
    });
    titleSelectable.push(titleCustomChip);

    document.getElementById('title').addEventListener('input', (e) => { title = e.target.value; compose(); });
    document.getElementById('titleFont').addEventListener('input', (e) => { titleFont = parseFloat(e.target.value); compose(); });

    document.getElementById('save').addEventListener('click', () => {
      const a = document.createElement('a');
      a.download = 'tunetap-card.png';
      a.href = frontCanvas.toDataURL('image/png');
      a.click();
    });

    // ---- Go ----
    drawBack();
    compose();
    tick();
  </script>
</body>
</html>
