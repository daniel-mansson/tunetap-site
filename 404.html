<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>TuneTap</title>
  <meta name="description" content="Open this TuneTap playlist in Spotify.">
  <meta name="theme-color" content="#fbfaf8">
  <meta name="color-scheme" content="light">
  <style>
    :root {
      --bg: #fbfaf8; --bg2: #f1ede6; --ink: #1a1722; --muted: #7a7385;
      --accent: #1db954; --accent-deep: #0f9d58; --accent-ink: #04120a;
      --line: rgba(26,23,34,0.10); --line-soft: rgba(26,23,34,0.06);
      --panel: #ffffff;
      --lift: 0 1px 0 rgba(255,255,255,0.7) inset, 0 10px 24px -14px rgba(26,23,34,0.22);
    }
    * { box-sizing: border-box; }
    html { -webkit-text-size-adjust: 100%; }
    body {
      margin: 0; min-height: 100dvh; color: var(--ink); line-height: 1.5;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
      background:
        radial-gradient(90% 55% at 50% -8%, rgba(29,185,84,0.10), transparent 62%),
        linear-gradient(180deg, var(--bg) 0%, var(--bg2) 100%);
      background-attachment: fixed;
      display: flex; justify-content: center;
      padding: max(36px, env(safe-area-inset-top)) 22px max(34px, env(safe-area-inset-bottom));
    }
    main { width: 100%; max-width: 420px; text-align: center; }

    .brand {
      display: inline-flex; align-items: center; gap: 8px; font-weight: 700;
      font-size: 15px; letter-spacing: -0.01em; color: var(--ink);
      padding: 7px 14px 7px 8px; border: 1px solid var(--line); border-radius: 999px;
      background: var(--panel); box-shadow: var(--lift);
    }
    .brand .dot {
      width: 22px; height: 22px; border-radius: 7px; display: grid; place-items: center;
      font-size: 12px; background: linear-gradient(150deg, var(--accent), var(--accent-deep));
    }
    .brand .tap { color: var(--accent); }

    h1 { font-size: 25px; margin: 24px 0 0; letter-spacing: -0.02em; font-weight: 700; }
    h1 .title { color: var(--accent); }
    .lead { color: var(--muted); margin: 10px auto 0; font-size: 15px; max-width: 340px; }

    .embed {
      margin-top: 22px; border-radius: 18px; overflow: hidden; min-height: 80px;
      border: 1px solid var(--line); box-shadow: var(--lift); background: var(--panel);
    }
    .embed iframe { display: block; width: 100%; border: 0; }

    .actions { margin-top: 16px; display: grid; gap: 10px; }
    .btn {
      display: block; text-decoration: none; padding: 14px 22px; border-radius: 15px;
      font-weight: 600; font-size: 16px; letter-spacing: -0.01em;
      transition: transform 0.15s ease;
    }
    .btn:active { transform: translateY(1px); }
    .btn.primary {
      background: linear-gradient(150deg, var(--accent), var(--accent-deep)); color: var(--accent-ink);
      box-shadow: 0 12px 26px -14px rgba(29,185,84,0.65);
    }
    .btn.secondary { background: var(--panel); color: var(--ink); border: 1px solid var(--line); box-shadow: var(--lift); }

    .get { margin-top: 24px; padding-top: 22px; border-top: 1px solid var(--line-soft); }
    .get p { margin: 0 0 12px; font-size: 14px; color: var(--muted); }
    .stores { display: grid; gap: 10px; }
    .store {
      display: flex; align-items: center; justify-content: center; gap: 11px;
      text-decoration: none; padding: 12px 18px; border-radius: 15px;
      background: var(--panel); color: var(--ink); border: 1px solid var(--line);
      box-shadow: var(--lift); transition: transform 0.15s ease;
    }
    .store:active { transform: translateY(1px); }
    .store svg { width: 24px; height: 24px; flex: 0 0 auto; }
    .store .txt { text-align: left; line-height: 1.15; }
    .store .txt small { display: block; font-size: 10px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--muted); }
    .store .txt strong { display: block; font-size: 16px; font-weight: 600; letter-spacing: -0.01em; }
    .shoplink { display: inline-block; margin-top: 14px; font-size: 13px; color: var(--muted); text-decoration: none; }
    .shoplink b { color: var(--accent); }

    .details { margin-top: 22px; text-align: left; }
    .details summary {
      cursor: pointer; font-size: 12px; color: var(--muted); list-style: none;
      letter-spacing: 0.04em; text-transform: uppercase;
    }
    .details summary::-webkit-details-marker { display: none; }
    .details summary::before { content: "› "; }
    .details[open] summary::before { content: "⌄ "; }
    pre.debug {
      margin: 10px 0 0; padding: 12px; background: var(--bg2); border: 1px solid var(--line-soft);
      border-radius: 12px; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 12px; line-height: 1.5; color: var(--ink); white-space: pre-wrap; word-break: break-all;
    }
  </style>
</head>
<body>
  <main>
    <span class="brand"><span class="dot">🎵</span>Tune<span class="tap">Tap</span></span>

    <h1 id="heading">Open in Spotify</h1>
    <p class="lead" id="lead">Play it right here &mdash; or get the app to tap and play.</p>
    <div class="embed" id="embed"></div>
    <div class="actions" id="actions"></div>

    <div class="get" id="get" style="display:none">
      <p>Get the app to set up your cards and play with a tap.</p>
      <div class="stores">
        <!-- TODO: replace with the real App Store listing URL/id once published. -->
        <a class="store" href="https://apps.apple.com/app/tunetap" aria-label="Download TuneTap on the App Store">
          <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M16.365 1.43c0 1.14-.42 2.22-1.17 3.02-.8.86-2.1 1.53-3.2 1.44-.14-1.1.42-2.28 1.13-3.05.79-.86 2.19-1.5 3.24-1.41zM20.7 17.1c-.55 1.27-.82 1.84-1.53 2.96-.99 1.56-2.39 3.5-4.12 3.51-1.54.02-1.94-1.01-4.03-1-2.09.01-2.53 1.02-4.07 1-1.73-.02-3.05-1.77-4.04-3.32-2.77-4.35-3.06-9.45-1.35-12.16 1.21-1.92 3.13-3.05 4.93-3.05 1.84 0 2.99 1.01 4.51 1.01 1.47 0 2.37-1.01 4.5-1.01 1.6 0 3.3.87 4.51 2.38-3.96 2.17-3.32 7.83.21 9.67z"/></svg>
          <span class="txt"><small>Download on the</small><strong>App Store</strong></span>
        </a>
        <!-- Canonical Play listing URL for package to.tunetap.app (live once published). -->
        <a class="store" href="https://play.google.com/store/apps/details?id=to.tunetap.app" aria-label="Get TuneTap on Google Play">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path fill="#EA4335" d="M3.6 2.2c-.2.2-.35.55-.35 1v17.6c0 .45.15.8.36 1L13 12z"/><path fill="#FBBC04" d="M17.1 8.4 13 12l4.1 3.6 3.6-2.05c1.05-.6 1.05-1.5 0-2.1z"/><path fill="#34A853" d="M3.61 21.8c.33.35.87.4 1.48.05L17.1 15.6 13 12z"/><path fill="#4285F4" d="M13 12 17.1 8.4 5.09 2.15C4.48 1.8 3.94 1.85 3.61 2.2z"/></svg>
          <span class="txt"><small>Get it on</small><strong>Google Play</strong></span>
        </a>
      </div>
      <!-- TODO: point at the real shop/checkout URL once the store is live. -->
      <a class="shoplink" href="https://tunetap.to/#shop">Want your own? <b>Shop the cards &rarr;</b></a>
    </div>

    <details class="details">
      <summary>Link details</summary>
      <pre class="debug" id="debug"></pre>
    </details>
  </main>

  <script>
    // Tag links are https://tunetap.to/p/{playlistId}?t={shortTitle}. When the
    // app is NOT installed the OS falls through to the browser and GitHub Pages
    // serves this 404 page (at the original URL, 404 status). Everything below
    // is recovered client-side from the address bar.
    (function () {
      var path = location.pathname;
      var params = new URLSearchParams(location.search);
      var idMatch = path.match(/^\/p\/([0-9A-Za-z]{22})$/);
      var id = idMatch ? idMatch[1] : null;
      var title = params.get('t');

      var heading = document.getElementById('heading');
      var lead = document.getElementById('lead');
      var embed = document.getElementById('embed');
      var actions = document.getElementById('actions');

      if (id) {
        if (title) { heading.innerHTML = '<span class="title"></span>'; heading.firstChild.textContent = title; }
        else { heading.textContent = 'Open in Spotify'; }

        // Live Spotify player for the playlist — no auth / API key needed.
        var iframe = document.createElement('iframe');
        iframe.src = 'https://open.spotify.com/embed/playlist/' + id;
        iframe.height = 352;
        iframe.loading = 'lazy';
        iframe.allow = 'encrypted-media; clipboard-write; fullscreen; picture-in-picture';
        embed.appendChild(iframe);

        actions.innerHTML =
          '<a class="btn primary" href="spotify:playlist:' + id + '">Open in Spotify app</a>' +
          '<a class="btn secondary" href="https://open.spotify.com/playlist/' + id + '">Open in web player</a>';

        // They reached the fallback (app not installed) — offer the app.
        document.getElementById('get').style.display = 'block';
      } else {
        heading.textContent = 'Link not recognized';
        lead.textContent = 'This doesn’t look like a TuneTap tag.';
        actions.innerHTML = '<a class="btn primary" href="/">Go to tunetap.to</a>';
      }

      // Collapsed link details: exactly what the page received in the URL.
      document.getElementById('debug').textContent = JSON.stringify({
        href: location.href,
        pathname: path,
        search: location.search,
        hash: location.hash,
        parsed: { playlistId: id, title: title, matched: !!id }
      }, null, 2);
    })();
  </script>
</body>
</html>
