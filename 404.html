<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TuneTap</title>
  <meta name="description" content="Open this TuneTap playlist in Spotify.">
  <style>
    :root {
      --bg: #faf9fb; --fg: #1a1626; --muted: #6b6580; --accent: #1db954; --card: #ffffff; --border: #e7e3ee;
    }
    @media (prefers-color-scheme: dark) {
      :root { --bg: #120f1a; --fg: #f4f1fa; --muted: #a49dba; --accent: #1ed760; --card: #1c1728; --border: #2c2440; }
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg); color: var(--fg); line-height: 1.5;
      display: flex; min-height: 100vh; align-items: center; justify-content: center; padding: 24px; }
    .card { max-width: 440px; width: 100%; background: var(--card); border: 1px solid var(--border);
      border-radius: 20px; padding: 40px 32px; text-align: center; }
    .logo { font-size: 44px; margin-bottom: 8px; }
    h1 { font-size: 24px; margin: 0 0 6px; letter-spacing: -0.02em; }
    p { color: var(--muted); margin: 10px 0 0; }
    .btn { display: inline-block; margin-top: 24px; background: var(--accent); color: #04120a;
      font-weight: 700; text-decoration: none; padding: 13px 26px; border-radius: 999px; }
    .btn.secondary { background: transparent; color: var(--fg); border: 1px solid var(--border);
      font-weight: 600; margin-top: 12px; }
    .stack { display: flex; flex-direction: column; align-items: center; }
    a { color: var(--accent); }
    .hint { font-size: 13px; margin-top: 20px; }
  </style>
</head>
<body>
  <main class="card">
    <div class="logo">🎵</div>
    <div id="content">
      <h1>Open in Spotify</h1>
      <p id="lead">If the TuneTap app is installed, this link opens it automatically. Otherwise:</p>
      <div class="stack" id="actions"></div>
      <p class="hint">Don&rsquo;t have TuneTap yet? It turns NFC tags into one-tap Spotify triggers.</p>
    </div>
  </main>
  <script>
    // Tag links are https://tunetap.to/p/{playlistId}. When the app is NOT
    // installed the OS falls through to the browser and GitHub Pages serves
    // this 404 page for the unmatched /p/ path. Recover the playlist id and
    // offer a direct Spotify link so the tap still does something useful.
    (function () {
      var m = location.pathname.match(/^\/p\/([0-9A-Za-z]{22})$/);
      var actions = document.getElementById('actions');
      if (m) {
        var id = m[1];
        var web = 'https://open.spotify.com/playlist/' + id;
        var app = 'spotify:playlist:' + id;
        actions.innerHTML =
          '<a class="btn" href="' + app + '">Open in Spotify app</a>' +
          '<a class="btn secondary" href="' + web + '">Open in web player</a>';
      } else {
        document.getElementById('lead').textContent =
          'This TuneTap link could not be recognized.';
        actions.innerHTML = '<a class="btn" href="/">Go to tunetap.to</a>';
      }
    })();
  </script>
</body>
</html>
