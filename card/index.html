<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <title>Card Lab · TuneTap</title>
  <meta name="description" content="Experimental 3D card display.">
  <meta name="theme-color" content="#e9ebf0">
  <meta name="color-scheme" content="light">
  <meta name="robots" content="noindex">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <style>
    :root {
      --ink: #1a1722;
      --glass: rgba(255,255,255,0.62);
      --glass-line: rgba(26,23,34,0.10);
      --accent: #1db954;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body {
      margin: 0; height: 100%; overflow: hidden;
      overscroll-behavior: none; touch-action: none;
      position: fixed; inset: 0; width: 100%;
    }
    body {
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
      background:
        radial-gradient(130% 120% at 50% -10%, #ffffff 0%, #eef0f4 42%, #dcdfe6 78%, #cdd1da 100%);
    }
    #gl { display: block; position: fixed; inset: 0; width: 100%; height: 100%; }

    .topbar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 10;
      display: flex; align-items: center; gap: 8px;
      padding: max(12px, env(safe-area-inset-top)) 14px 12px;
      justify-content: center; flex-wrap: wrap;
    }
    .btn {
      appearance: none; border: 1px solid var(--glass-line);
      background: var(--glass); backdrop-filter: blur(14px) saturate(1.2);
      -webkit-backdrop-filter: blur(14px) saturate(1.2);
      color: var(--ink); font: inherit; font-weight: 600; font-size: 14px;
      letter-spacing: -0.01em; padding: 9px 15px; border-radius: 999px;
      display: inline-flex; align-items: center; gap: 7px; cursor: pointer;
      box-shadow: 0 1px 0 rgba(255,255,255,0.8) inset, 0 8px 20px -12px rgba(26,23,34,0.5);
      transition: transform .12s ease, background .2s ease;
    }
    .btn:active { transform: translateY(1px) scale(0.97); }
    .btn .ico { font-size: 15px; line-height: 1; opacity: 0.85; }
    .btn.primary { background: var(--ink); color: #fff; border-color: transparent; }
    .btn.primary .ico { opacity: 1; }

    .hint {
      position: fixed; left: 0; right: 0; bottom: max(16px, env(safe-area-inset-bottom));
      text-align: center; font-size: 12px; letter-spacing: 0.02em;
      color: rgba(26,23,34,0.42); z-index: 10; pointer-events: none;
    }
  </style>
</head>
<body>
  <canvas id="gl"></canvas>

  <div class="topbar">
    <button class="btn primary" id="restart"><span class="ico">↺</span>Restart</button>
    <button class="btn" id="spin"><span class="ico">⟳</span>Spin</button>
    <button class="btn" id="flip"><span class="ico">⇄</span>Flip</button>
  </div>

  <div class="hint" id="hint">v5</div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.169.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.169.0/examples/jsm/"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';

    // ---- Card dimensions (credit-card ratio 1.586 : 1) ----
    const CARD_W = 3.4;
    const CARD_H = CARD_W / 1.586;   // ~2.143
    const CARD_D = 0.055;
    const RADIUS = 0.14;

    const canvas = document.getElementById('gl');
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
    renderer.setClearColor(0x000000, 0);
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.05;
    renderer.outputColorSpace = THREE.SRGBColorSpace;

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(42, 1, 0.1, 100);

    // ---- Soft studio environment for clean reflections ----
    const pmrem = new THREE.PMREMGenerator(renderer);
    scene.environment = pmrem.fromScene(new RoomEnvironment(), 0.04).texture;

    // ---- Subtle key light for a directional highlight ----
    const key = new THREE.DirectionalLight(0xffffff, 1.1);
    key.position.set(2.2, 4.5, 3.5);
    scene.add(key);
    const fill = new THREE.DirectionalLight(0xdfe6ff, 0.35);
    fill.position.set(-3, 1.5, 2);
    scene.add(fill);

    // ---- Canvas-texture helpers ----
    const maxAniso = renderer.capabilities.getMaxAnisotropy();
    function rr(ctx, x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.arcTo(x + w, y, x + w, y + h, r);
      ctx.arcTo(x + w, y + h, x, y + h, r);
      ctx.arcTo(x, y + h, x, y, r);
      ctx.arcTo(x, y, x + w, y, r);
      ctx.closePath();
    }
    function makeTexture(draw) {
      const W = 1024, H = Math.round(1024 / 1.586);
      const c = document.createElement('canvas');
      c.width = W; c.height = H;
      const ctx = c.getContext('2d');
      const r = W * (RADIUS / CARD_W);
      ctx.save();
      rr(ctx, 0, 0, W, H, r);
      ctx.clip();
      draw(ctx, W, H);
      ctx.restore();
      const tex = new THREE.CanvasTexture(c);
      tex.colorSpace = THREE.SRGBColorSpace;
      tex.anisotropy = maxAniso;
      return tex;
    }

    // Editorial style: dark header bar + left-aligned title, full-bleed scene below.
    const TITLE = 'Morning Focus';
    const HEADER = 0.08;          // header height as fraction of card height
    const HEADER_COLOR = 'rgba(58,64,54,0.97)';
    const HEADER_INK = '#f2f1ea';

    function drawHeader(ctx, W, H, title, right) {
      const hh = H * HEADER;
      ctx.fillStyle = HEADER_COLOR;
      ctx.fillRect(0, 0, W, hh);
      ctx.fillStyle = 'rgba(0,0,0,0.10)';         // hairline under the bar
      ctx.fillRect(0, hh - 2, W, 2);
      ctx.textBaseline = 'middle';
      ctx.textAlign = 'left';
      ctx.fillStyle = HEADER_INK;
      ctx.font = `500 ${Math.round(hh * 0.42)}px -apple-system, "Segoe UI", Roboto, sans-serif`;
      ctx.fillText(title, W * 0.045, hh * 0.55);
      if (right) {
        ctx.textAlign = 'right';
        ctx.fillStyle = 'rgba(242,241,234,0.62)';
        ctx.font = `500 ${Math.round(hh * 0.30)}px -apple-system, sans-serif`;
        ctx.fillText(right, W * 0.955, hh * 0.55);
        ctx.textAlign = 'left';
      }
    }

    // Stylized misty layered hills, rendered procedurally (self-contained, no image deps).
    const frontTex = makeTexture((ctx, W, H) => {
      // hazy sky
      const sky = ctx.createLinearGradient(0, 0, 0, H);
      sky.addColorStop(0, '#e9e7d7');
      sky.addColorStop(0.5, '#dedecc');
      sky.addColorStop(1, '#c9cfba');
      ctx.fillStyle = sky; ctx.fillRect(0, 0, W, H);

      // warm morning glow, upper right
      const glow = ctx.createRadialGradient(W * 0.8, H * 0.26, 10, W * 0.8, H * 0.26, W * 0.62);
      glow.addColorStop(0, 'rgba(245,227,178,0.85)');
      glow.addColorStop(1, 'rgba(245,227,178,0)');
      ctx.fillStyle = glow; ctx.fillRect(0, 0, W, H);

      // layered ridges, back (hazy) -> front (dark green), fog hugging each ridge
      const layers = [
        { base: 0.40, amp: 0.045, phase: 0.5, color: '#b0bba4' },
        { base: 0.50, amp: 0.060, phase: 2.1, color: '#8d9e80' },
        { base: 0.61, amp: 0.070, phase: 3.6, color: '#6b8261' },
        { base: 0.72, amp: 0.085, phase: 1.2, color: '#4d6945' },
        { base: 0.83, amp: 0.100, phase: 4.4, color: '#33502b' },
      ];
      layers.forEach((L, idx) => {
        const baseY = H * L.base, amp = H * L.amp, steps = 48;
        ctx.beginPath();
        ctx.moveTo(0, H); ctx.lineTo(0, baseY);
        for (let i = 0; i <= steps; i++) {
          const x = (i / steps) * W;
          const y = baseY + Math.sin(i * 0.28 + L.phase) * amp + Math.sin(i * 0.11 + L.phase * 1.6) * amp * 0.5;
          ctx.lineTo(x, y);
        }
        ctx.lineTo(W, H); ctx.closePath();
        ctx.fillStyle = L.color; ctx.fill();

        const fog = ctx.createLinearGradient(0, baseY - amp, 0, baseY + amp * 3);
        fog.addColorStop(0, 'rgba(240,240,232,0)');
        fog.addColorStop(0.5, `rgba(240,240,232,${0.34 - idx * 0.05})`);
        fog.addColorStop(1, 'rgba(240,240,232,0)');
        ctx.fillStyle = fog; ctx.fillRect(0, baseY - amp, W, amp * 4);
      });

      // cool shade lower-left for depth
      const shade = ctx.createRadialGradient(W * 0.12, H * 1.0, 10, W * 0.12, H * 1.0, W * 0.7);
      shade.addColorStop(0, 'rgba(18,34,18,0.30)');
      shade.addColorStop(1, 'rgba(18,34,18,0)');
      ctx.fillStyle = shade; ctx.fillRect(0, 0, W, H);

      drawHeader(ctx, W, H, TITLE);
    });

    const backTex = makeTexture((ctx, W, H) => {
      // soft sage body
      const g = ctx.createLinearGradient(0, 0, 0, H);
      g.addColorStop(0, '#d0d5c5'); g.addColorStop(1, '#a9b499');
      ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);

      // NFC arcs, centered
      const cx = W * 0.5, cy = H * 0.50;
      ctx.strokeStyle = 'rgba(51,80,43,0.7)'; ctx.lineWidth = 6; ctx.lineCap = 'round';
      for (let i = 1; i <= 3; i++) {
        ctx.beginPath();
        ctx.arc(cx - i * 5, cy, i * W * 0.05, -Math.PI * 0.4, Math.PI * 0.4);
        ctx.stroke();
      }
      ctx.fillStyle = 'rgba(51,80,43,0.7)';
      ctx.beginPath(); ctx.arc(cx - W * 0.02, cy, 8, 0, Math.PI * 2); ctx.fill();

      // caption + footer
      ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';
      ctx.fillStyle = 'rgba(38,54,34,0.85)';
      ctx.font = `600 ${Math.round(H * 0.075)}px -apple-system, sans-serif`;
      ctx.fillText('Tap to play', cx, H * 0.80);
      ctx.fillStyle = 'rgba(38,54,34,0.5)';
      ctx.font = `400 ${Math.round(H * 0.05)}px -apple-system, sans-serif`;
      ctx.fillText('tunetap.to', cx, H * 0.90);
      ctx.textAlign = 'left';

      drawHeader(ctx, W, H, 'TuneTap', 'NFC');
    });

    // ---- Build the card ----
    const card = new THREE.Group();
    scene.add(card);

    // Rounded-rectangle profile extruded to card thickness. Unlike RoundedBoxGeometry
    // (whose corner radius is clamped to half the depth -> nearly square on a thin card),
    // this gives a true RADIUS face corner that matches the art silhouette exactly.
    function roundedRectShape(w, h, r) {
      const s = new THREE.Shape();
      const x = -w / 2, y = -h / 2;
      s.moveTo(x + r, y);
      s.lineTo(x + w - r, y);
      s.quadraticCurveTo(x + w, y, x + w, y + r);
      s.lineTo(x + w, y + h - r);
      s.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      s.lineTo(x + r, y + h);
      s.quadraticCurveTo(x, y + h, x, y + h - r);
      s.lineTo(x, y + r);
      s.quadraticCurveTo(x, y, x + r, y);
      return s;
    }
    const bodyGeo = new THREE.ExtrudeGeometry(
      roundedRectShape(CARD_W, CARD_H, RADIUS),
      { depth: CARD_D, bevelEnabled: false, curveSegments: 32 }
    );
    bodyGeo.translate(0, 0, -CARD_D / 2);   // center thickness on z=0
    const body = new THREE.Mesh(
      bodyGeo,
      new THREE.MeshPhysicalMaterial({
        color: 0xe8e5db, roughness: 0.4, metalness: 0.0,
        clearcoat: 0.7, clearcoatRoughness: 0.25,
      })
    );
    card.add(body);

    function facePlane(tex, front) {
      const mat = new THREE.MeshPhysicalMaterial({
        map: tex, roughness: 0.42, metalness: 0.0,
        clearcoat: 0.55, clearcoatRoughness: 0.28,
        transparent: true, alphaTest: 0.5,
      });
      // Full card size so the art's rounded corners (radius = RADIUS/CARD_W in the
      // texture) line up exactly with the mesh silhouette — no corner mismatch.
      const m = new THREE.Mesh(new THREE.PlaneGeometry(CARD_W, CARD_H), mat);
      m.position.z = front ? (CARD_D / 2 + 0.004) : -(CARD_D / 2 + 0.004);
      if (!front) m.rotation.y = Math.PI;
      return m;
    }
    card.add(facePlane(frontTex, true));
    card.add(facePlane(backTex, false));

    // ---- Discrete contact shadow (soft radial blob) ----
    const shadowTex = (() => {
      const c = document.createElement('canvas');
      c.width = c.height = 256;
      const ctx = c.getContext('2d');
      const g = ctx.createRadialGradient(128, 128, 8, 128, 128, 128);
      g.addColorStop(0, 'rgba(20,25,35,0.55)');
      g.addColorStop(0.5, 'rgba(20,25,35,0.22)');
      g.addColorStop(1, 'rgba(20,25,35,0)');
      ctx.fillStyle = g; ctx.fillRect(0, 0, 256, 256);
      const t = new THREE.CanvasTexture(c);
      t.colorSpace = THREE.SRGBColorSpace;
      return t;
    })();
    const SHADOW_Y = -1.35;
    const shadow = new THREE.Mesh(
      new THREE.PlaneGeometry(CARD_W * 1.15, CARD_W * 1.15),
      new THREE.MeshBasicMaterial({ map: shadowTex, transparent: true, depthWrite: false })
    );
    shadow.rotation.x = -Math.PI / 2;
    shadow.position.y = SHADOW_Y;
    scene.add(shadow);

    // ---- Camera framing (fit card + margin, portrait-first) ----
    let START_Y = 5;
    function resize() {
      const w = window.innerWidth, h = window.innerHeight;
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.setSize(w, h, false);
      const aspect = w / h;
      camera.aspect = aspect;
      const vFov = THREE.MathUtils.degToRad(camera.fov);
      const fitH = (CARD_H * 0.5) / Math.tan(vFov / 2);
      const fitW = (CARD_W * 0.5) / (Math.tan(vFov / 2) * aspect);
      const dist = Math.max(fitH, fitW) * 1.9;
      camera.position.set(0, 0.12, dist);
      camera.lookAt(0, 0, 0);
      camera.updateProjectionMatrix();
      const viewHalfH = Math.tan(vFov / 2) * dist;
      START_Y = viewHalfH + CARD_H;   // guarantee it starts above the viewport
    }
    window.addEventListener('resize', resize);
    if (window.visualViewport) window.visualViewport.addEventListener('resize', resize);
    resize();

    // ---- Animation state machine ----
    const clock = new THREE.Clock();
    const DROP = 1.0, SPIN = 1.5, SETTLE = 0.8;
    const INTRO_TOTAL = DROP + SPIN + SETTLE;
    const SPINS = Math.PI * 2 * 2;   // full turns during intro

    let mode = 'intro';
    let startT = 0;
    let curRotY = 0, spinTarget = 0, flip = 0;
    let pX = 0, pY = 0, tpX = 0, tpY = 0;

    const clamp = (v, a, b) => Math.min(b, Math.max(a, v));
    const lerp = (a, b, t) => a + (b - a) * t;
    const easeOutCubic = t => 1 - Math.pow(1 - t, 3);
    const easeInOutCubic = t => t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
    const easeOutBack = t => { const c = 1.70158; return 1 + (c + 1) * Math.pow(t - 1, 3) + c * Math.pow(t - 1, 2); };

    function restart() {
      mode = 'intro'; startT = clock.getElapsedTime();
      curRotY = 0; spinTarget = 0; flip = 0;
    }

    function updateShadow() {
      const h = clamp(card.position.y / START_Y, 0, 1);
      shadow.scale.setScalar(lerp(1.0, 2.5, h));
      shadow.material.opacity = lerp(0.9, 0.05, h);
      shadow.position.x = card.position.x * 0.6;
    }

    function frame() {
      const now = clock.getElapsedTime();
      const e = now - startT;

      if (mode === 'intro') {
        if (e < DROP) {
          const p = easeOutBack(clamp(e / DROP, 0, 1));
          card.position.y = lerp(START_Y, 0, p);
          card.rotation.x = lerp(0.55, 0.12, p);
          card.rotation.y = lerp(-0.7, 0, p);
        } else if (e < DROP + SPIN) {
          const p = easeInOutCubic((e - DROP) / SPIN);
          card.position.y = Math.sin(p * Math.PI) * 0.12;
          card.rotation.y = lerp(0, SPINS, p);
          card.rotation.x = 0.12 + Math.sin(p * Math.PI) * 0.18;
        } else if (e < INTRO_TOTAL) {
          const p = easeOutCubic((e - DROP - SPIN) / SETTLE);
          card.position.y = lerp(0.12, 0, p) + 0;
          card.rotation.y = SPINS;
          card.rotation.x = lerp(0.12, 0, p);
        } else {
          mode = 'idle';
          curRotY = SPINS; spinTarget = SPINS;
        }
      }

      if (mode === 'idle') {
        const it = now;
        const target = spinTarget + flip;
        curRotY += (target - curRotY) * 0.09;
        pX += (tpX - pX) * 0.06; pY += (tpY - pY) * 0.06;
        card.rotation.y = curRotY + Math.sin(it * 0.55) * 0.10 + pX * 0.35;
        card.rotation.x = Math.sin(it * 0.8) * 0.045 + pY * 0.25;
        card.position.y = Math.sin(it * 1.1) * 0.05;
      }

      updateShadow();
      renderer.render(scene, camera);
      requestAnimationFrame(frame);
    }

    // ---- Pointer parallax (desktop + touch drag) ----
    window.addEventListener('pointermove', (ev) => {
      tpX = (ev.clientX / window.innerWidth) * 2 - 1;
      tpY = (ev.clientY / window.innerHeight) * 2 - 1;
    });

    // ---- Controls ----
    document.getElementById('restart').addEventListener('click', restart);
    document.getElementById('spin').addEventListener('click', () => {
      if (mode === 'idle') spinTarget += Math.PI * 2;
    });
    document.getElementById('flip').addEventListener('click', () => {
      if (mode === 'idle') flip = flip === 0 ? Math.PI : 0;
    });

    restart();
    frame();
  </script>
</body>
</html>
