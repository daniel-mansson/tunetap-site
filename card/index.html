<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Card · TuneTap</title>
  <meta name="description" content="Experimental card display experience.">
  <meta name="theme-color" content="#fbfaf8">
  <meta name="color-scheme" content="light">
  <meta name="robots" content="noindex">
  <style>
    :root {
      --bg: #fbfaf8; --bg2: #f1ede6; --ink: #1a1722; --muted: #7a7385;
      --accent: #1db954; --accent-deep: #0f9d58;
      --line: rgba(26,23,34,0.10);
      --panel: #ffffff;
      --lift: 0 1px 0 rgba(255,255,255,0.7) inset, 0 10px 24px -14px rgba(26,23,34,0.22);
    }
    * { box-sizing: border-box; }
    html { -webkit-text-size-adjust: 100%; }
    body {
      margin: 0; min-height: 100dvh; color: var(--ink); line-height: 1.5;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
      background:
        radial-gradient(90% 55% at 50% -8%, rgba(29,185,84,0.10), transparent 62%),
        linear-gradient(180deg, var(--bg) 0%, var(--bg2) 100%);
      background-attachment: fixed;
      display: flex; justify-content: center; align-items: center;
      padding: max(40px, env(safe-area-inset-top)) 22px max(36px, env(safe-area-inset-bottom));
    }
    main { width: 100%; max-width: 420px; text-align: center; }

    .brand {
      display: inline-flex; align-items: center; gap: 8px; font-weight: 700;
      font-size: 15px; letter-spacing: -0.01em; color: var(--ink);
      padding: 7px 14px 7px 8px; border: 1px solid var(--line); border-radius: 999px;
      background: var(--panel); box-shadow: var(--lift);
    }
    .brand .dot {
      width: 22px; height: 22px; border-radius: 7px; display: grid; place-items: center;
      font-size: 12px; background: linear-gradient(150deg, var(--accent), var(--accent-deep));
    }
    .brand .tap { color: var(--accent); }

    .placeholder {
      margin-top: 30px; padding: 40px 26px;
      border: 1px dashed var(--line); border-radius: 20px;
      background: var(--panel); box-shadow: var(--lift);
    }
    .placeholder h1 { margin: 0 0 8px; font-size: 22px; letter-spacing: -0.02em; }
    .placeholder p { margin: 0; color: var(--muted); font-size: 15px; }
  </style>
</head>
<body>
  <main>
    <span class="brand"><span class="dot">♪</span>Tune<span class="tap">Tap</span></span>
    <section class="placeholder">
      <h1>Card experience</h1>
      <p>Placeholder — the card display experiment lives here.</p>
    </section>
  </main>
</body>
</html>
